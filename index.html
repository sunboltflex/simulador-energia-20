<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Desconto de Energia</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: url("https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .card {
      border-radius: 1rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
    }

    .top-image {
      width: 180px;
      height: auto;
      margin: 20px auto;
      display: block;
    }

    #btnWhatsApp {
      background-color: #25D366;
      border: none;
    }

    #btnWhatsApp:hover {
      background-color: #1ebe5b;
    }

    .aviso-atencao {
      background-color: #fff3cd;
      border-left: 5px solid #ffa500;
      padding: 12px;
      margin-top: 15px;
      font-size: 0.95rem;
      color: #664d03;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <div class="container py-4">
    <img src="LOGO-03.png" alt="Logo" class="top-image">

    <div class="card p-4 mx-auto" style="max-width: 500px;">
      <h2 class="text-center mb-4">⚡ Simule seu Desconto - Gerador de Energia</h2>

      <div class="mb-3">
        <label for="consumo" class="form-label fw-bold">Consumo Mensal (kWh):</label>
        <input type="text" id="consumo" inputmode="decimal" placeholder="Ex: 647" class="form-control" autofocus>
      </div>

      <div class="mb-3">
        <label for="descontoManual" class="form-label fw-bold">Desconto Manual (%):</label>
        <input type="text" id="descontoManual" inputmode="decimal" placeholder="Ex: 20, 22, 25" class="form-control">
      </div>

      <button class="btn btn-success w-100 mb-3" onclick="calcular()">Calcular</button>

      <div id="resultado" class="alert alert-light border mt-3" style="display:none;"></div>

      <div id="aviso" class="text-danger fw-bold text-center"></div>

      <button id="btnWhatsApp" class="btn w-100 mt-3 text-white" onclick="enviarWhatsApp()" style="display:none;">
        📲 Enviar resultado pelo WhatsApp
      </button>

      <div id="erro" class="text-danger fw-bold text-center mt-2"></div>
    </div>
  </div>

  <script>
    let valorTotal = 0;

    function converterNumero(valor) {
      if (!valor) return 0;
      return parseFloat(valor.toString().replace(",", ".")) || 0;
    }

    function calcular() {
      let consumo = converterNumero(document.getElementById('consumo').value);
      let descontoManual = converterNumero(document.getElementById('descontoManual').value);

      const erroDiv = document.getElementById('erro');
      const resultadoDiv = document.getElementById('resultado');
      const btnWhatsApp = document.getElementById('btnWhatsApp');
      const avisoDiv = document.getElementById('aviso');

      if (consumo < 0 || descontoManual < 0) {
        erroDiv.textContent = "⚠️ Os valores não podem ser negativos.";
        resultadoDiv.style.display = 'none';
        btnWhatsApp.style.display = 'none';
        avisoDiv.textContent = "";
        return;
      }

      if (descontoManual > 100) {
        erroDiv.textContent = "⚠️ O desconto manual não pode ser maior que 100%.";
        resultadoDiv.style.display = 'none';
        btnWhatsApp.style.display = 'none';
        avisoDiv.textContent = "";
        return;
      }

      erroDiv.textContent = "";

      const tarifaTE = 0.3413;
      const tarifaTUSD = 0.63974;
      const adcBandeira = 0.02465;

      valorTotal = consumo * (tarifaTE + tarifaTUSD + adcBandeira);

      let desconto = 0;

      if (descontoManual > 0) {
        desconto = descontoManual / 100;
      } else {
        if (valorTotal >= 300 && valorTotal < 1000) {
          desconto = 0.15;
        } else if (valorTotal >= 1000) {
          desconto = 0.20;
        }
      }

      let descontoMensal = valorTotal * desconto;
      let descontoAnual = descontoMensal * 12;
      let valorDescFatura = valorTotal - descontoMensal;

      if (valorDescFatura < 0) valorDescFatura = 0;

      function formatar(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      }

      let resultadoHTML = `
       
        <p class="text-center text-success fw-bold">FATURA SUNBOLT FLEX</p> 
      `;

      if (desconto > 0) {
        resultadoHTML += `
          <p><strong>Desconto aplicado:</strong> ${(desconto * 100).toFixed(0)}%</p>
         
          <p><strong>Desconto mensal previsto:</strong> ${formatar(descontoMensal)}</p>
          <p><strong>Desconto anual previsto:</strong> ${formatar(descontoAnual)}</p>
          <div class="aviso-atencao">
            ⚠️ <strong>Atenção:</strong> Esta é uma simulação. Os valores podem variar conforme bandeiras tarifárias, consumo real e condições de contrato.
          </div>
        `;
      }

      resultadoDiv.innerHTML = resultadoHTML;
      resultadoDiv.style.display = 'block';

      if (valorTotal >= 300) {
        btnWhatsApp.style.display = 'block';
        avisoDiv.textContent = "";
      } else {
        btnWhatsApp.style.display = 'none';
        avisoDiv.textContent = "⚠️ Faturas abaixo de R$ 300,00 não podem aderir ao desconto.";
      }
    }

    function enviarWhatsApp() {
      if (valorTotal < 300) {
        alert("⚠️ O envio só é permitido para valores acima de R$ 300,00.");
        return;
      }

      const resultadoTexto = document.getElementById('resultado').innerText;
      const telefone = "5585999416424";
      const mensagem = encodeURIComponent("Resultado do simulador de desconto de energia:\n\n" + resultadoTexto);
      const url = `https://wa.me/${telefone}?text=${mensagem}`;

      window.open(url, "_blank");
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.querySelector(".btn-success").click();
      }
    });
  </script>

</body>
</html>
