<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Simulador de Desconto de Energia</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background:
        url("https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?auto=format&fit=crop&w=1600&q=80")
        no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .card {
      border-radius: 1rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
    }

    .top-image {
      width: 180px;
      height: auto;
      margin: 20px auto;
      display: block;
    }

    #btnWhatsApp {
      background-color: #25D366;
      border: none;
    }

    #btnWhatsApp:hover {
      background-color: #1ebe5b;
    }

    .aviso-atencao {
      background-color: #fff3cd;
      border-left: 5px solid #ffa500;
      padding: 12px;
      margin-top: 15px;
      font-size: 0.95rem;
      color: #664d03;
      border-radius: 4px;
    }

    .bloco-tarifas {
      padding: 15px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .bloco-tipo-ligacao {
      padding: 14px 15px;
      margin-top: 14px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
    }

    .opcao-ligacao {
      padding: 10px 12px;
      margin-bottom: 8px;
      background-color: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      cursor: pointer;
    }

    .opcao-ligacao:last-child {
      margin-bottom: 0;
    }

    .opcao-ligacao:hover {
      background-color: #f1f5f9;
    }

    .opcao-ligacao label,
    .opcao-ligacao input {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container py-4">

    <img
      src="LOGO-03.png"
      alt="Logo Sunbolt"
      class="top-image"
    >

    <div
      class="card p-4 mx-auto"
      style="max-width: 500px;"
    >

      <h2 class="text-center mb-4">
        ⚡ Simule seu Desconto - Gerador de Energia
      </h2>

      <div class="mb-3">
        <label
          for="consumo"
          class="form-label fw-bold"
        >
          Consumo Mensal (kWh):
        </label>

        <input
          type="text"
          id="consumo"
          inputmode="decimal"
          placeholder="Ex: 647"
          class="form-control"
          autofocus
        >
      </div>

      <div class="mb-3">
        <label
          for="valorFaturaEnel"
          class="form-label fw-bold"
        >
          Valor da Fatura da Enel (R$):
        </label>

        <input
          type="text"
          id="valorFaturaEnel"
          inputmode="decimal"
          placeholder="Ex: 339,18"
          class="form-control"
        >

        <small class="text-muted">
          Informe o valor total apresentado na fatura da Enel.
        </small>

        <div class="bloco-tipo-ligacao">

          <label class="form-label fw-bold mb-2">
            Tipo de ligação:
          </label>

          <div class="opcao-ligacao form-check">
            <input
              class="form-check-input"
              type="radio"
              name="tipoLigacao"
              id="trifasico"
              value="trifasico"
            >

            <label
              class="form-check-label fw-semibold w-100"
              for="trifasico"
            >
              TRIFÁSICO — descontar 100 kWh do consumo mensal
            </label>
          </div>

          <div class="opcao-ligacao form-check">
            <input
              class="form-check-input"
              type="radio"
              name="tipoLigacao"
              id="monofasico"
              value="monofasico"
            >

            <label
              class="form-check-label fw-semibold w-100"
              for="monofasico"
            >
              MONOFÁSICO — descontar 30 kWh do consumo mensal
            </label>
          </div>

        </div>
      </div>

      <div class="bloco-tarifas">

        <h5 class="text-center mb-3">
          Tarifas da distribuidora
        </h5>

        <div class="mb-3">
          <label
            for="tarifaTE"
            class="form-label fw-bold"
          >
            Tarifa TE (R$/kWh):
          </label>

          <input
            type="text"
            id="tarifaTE"
            inputmode="decimal"
            placeholder="Ex: 0,3413"
            class="form-control"
          >
        </div>

        <div class="mb-3">
          <label
            for="tarifaTUSD"
            class="form-label fw-bold"
          >
            Tarifa TUSD (R$/kWh):
          </label>

          <input
            type="text"
            id="tarifaTUSD"
            inputmode="decimal"
            placeholder="Ex: 0,63974"
            class="form-control"
          >
        </div>

        <div>
          <label
            for="adcBandeira"
            class="form-label fw-bold"
          >
            Adicional de Bandeira (R$/kWh):
          </label>

          <input
            type="text"
            id="adcBandeira"
            inputmode="decimal"
            placeholder="Ex: 0,02465 ou 0"
            class="form-control"
          >

          <small class="text-muted">
            Digite 0 caso não haja adicional de bandeira.
          </small>
        </div>

      </div>

      <div class="mb-3">
        <label
          for="descontoManual"
          class="form-label fw-bold"
        >
          Desconto Manual (%):
        </label>

        <input
          type="text"
          id="descontoManual"
          inputmode="decimal"
          placeholder="Ex: 20, 22 ou 25"
          class="form-control"
        >

        <small class="text-muted">
          Caso fique vazio, o desconto será definido automaticamente.
        </small>
      </div>

      <button
        type="button"
        class="btn btn-success w-100 mb-3"
        onclick="calcular()"
      >
        Calcular
      </button>

      <div
        id="resultado"
        class="alert alert-light border mt-3"
        style="display: none;"
      ></div>

      <div
        id="aviso"
        class="text-danger fw-bold text-center"
      ></div>

      <button
        type="button"
        id="btnWhatsApp"
        class="btn w-100 mt-3 text-white"
        onclick="enviarWhatsApp()"
        style="display: none;"
      >
        📲 Enviar resultado pelo WhatsApp
      </button>

      <div
        id="erro"
        class="text-danger fw-bold text-center mt-2"
      ></div>

    </div>
  </div>

  <script>
    let valorFaturaEnelAtual = 0;

    function converterNumero(valor) {
      if (!valor) {
        return 0;
      }

      let valorLimpo = valor
        .toString()
        .trim()
        .replace(/\s/g, "")
        .replace(/R\$/gi, "");

      /*
        Aceita os formatos:

        339,18
        1.093,31
        339.18
        1093.31
      */

      if (
        valorLimpo.includes(",") &&
        valorLimpo.includes(".")
      ) {
        if (
          valorLimpo.lastIndexOf(",") >
          valorLimpo.lastIndexOf(".")
        ) {
          valorLimpo = valorLimpo
            .replace(/\./g, "")
            .replace(",", ".");
        } else {
          valorLimpo = valorLimpo.replace(/,/g, "");
        }
      } else if (valorLimpo.includes(",")) {
        valorLimpo = valorLimpo.replace(",", ".");
      }

      return parseFloat(valorLimpo) || 0;
    }

    function formatarMoeda(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarTarifa(valor) {
      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 4,
        maximumFractionDigits: 5
      });
    }

    function formatarPercentual(valor) {
      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function formatarConsumo(valor) {
      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function ocultarResultado() {
      document.getElementById("resultado").style.display = "none";
      document.getElementById("btnWhatsApp").style.display = "none";
      document.getElementById("aviso").textContent = "";
    }

    function mostrarErro(mensagem) {
      document.getElementById("erro").textContent = mensagem;
      ocultarResultado();
    }

    function calcular() {
      const consumo = converterNumero(
        document.getElementById("consumo").value
      );

      const valorFaturaEnel = converterNumero(
        document.getElementById("valorFaturaEnel").value
      );

      const tarifaTE = converterNumero(
        document.getElementById("tarifaTE").value
      );

      const tarifaTUSD = converterNumero(
        document.getElementById("tarifaTUSD").value
      );

      const adcBandeira = converterNumero(
        document.getElementById("adcBandeira").value
      );

      const descontoManual = converterNumero(
        document.getElementById("descontoManual").value
      );

      const tipoLigacaoSelecionado =
        document.querySelector(
          'input[name="tipoLigacao"]:checked'
        );

      const erroDiv =
        document.getElementById("erro");

      const resultadoDiv =
        document.getElementById("resultado");

      const btnWhatsApp =
        document.getElementById("btnWhatsApp");

      const avisoDiv =
        document.getElementById("aviso");

      if (consumo <= 0) {
        mostrarErro(
          "⚠️ Informe um consumo mensal válido."
        );

        return;
      }

      if (valorFaturaEnel <= 0) {
        mostrarErro(
          "⚠️ Informe um valor válido para a fatura da Enel."
        );

        return;
      }

      if (!tipoLigacaoSelecionado) {
        mostrarErro(
          "⚠️ Selecione o tipo de ligação: Trifásico ou Monofásico."
        );

        return;
      }

      if (tarifaTE <= 0) {
        mostrarErro(
          "⚠️ Informe uma tarifa TE válida."
        );

        return;
      }

      if (tarifaTUSD <= 0) {
        mostrarErro(
          "⚠️ Informe uma tarifa TUSD válida."
        );

        return;
      }

      if (adcBandeira < 0) {
        mostrarErro(
          "⚠️ O adicional de bandeira não pode ser negativo."
        );

        return;
      }

      if (descontoManual < 0) {
        mostrarErro(
          "⚠️ O desconto não pode ser negativo."
        );

        return;
      }

      if (descontoManual > 100) {
        mostrarErro(
          "⚠️ O desconto manual não pode ser maior que 100%."
        );

        return;
      }

      erroDiv.textContent = "";

      valorFaturaEnelAtual = valorFaturaEnel;

      const tipoLigacao =
        tipoLigacaoSelecionado.value;

      let consumoMinimo = 0;
      let nomeTipoLigacao = "";

      if (tipoLigacao === "trifasico") {
        consumoMinimo = 100;
        nomeTipoLigacao = "Trifásico";
      } else {
        consumoMinimo = 30;
        nomeTipoLigacao = "Monofásico";
      }

      /*
        Exemplo:

        Consumo informado: 600 kWh

        Trifásico:
        600 - 100 = 500 kWh

        Monofásico:
        600 - 30 = 570 kWh
      */

      const consumoConsiderado =
        Math.max(consumo - consumoMinimo, 0);

      /*
        A base do desconto utiliza o consumo
        após a retirada do custo de disponibilidade:

        Consumo considerado × Tarifa TE
        +
        Consumo considerado × Tarifa TUSD
        +
        Consumo considerado × Adicional de Bandeira
      */

      const valorTE =
        consumoConsiderado * tarifaTE;

      const valorTUSD =
        consumoConsiderado * tarifaTUSD;

      const valorBandeira =
        consumoConsiderado * adcBandeira;

      const baseCalculoDesconto =
        valorTE +
        valorTUSD +
        valorBandeira;

      let desconto = 0;

      /*
        Caso o desconto manual seja informado,
        ele terá prioridade.
      */

      if (descontoManual > 0) {
        desconto = descontoManual / 100;
      } else {
        /*
          Faixas automáticas:

          De R$ 300,00 até R$ 999,99 = 15%
          A partir de R$ 1.000,00 = 20%
        */

        if (
          valorFaturaEnel >= 300 &&
          valorFaturaEnel < 1000
        ) {
          desconto = 0.15;
        } else if (valorFaturaEnel >= 1000) {
          desconto = 0.20;
        }
      }

      const descontoMensal =
        baseCalculoDesconto * desconto;

      const descontoAnual =
        descontoMensal * 12;

      let valorDepoisDesconto =
        valorFaturaEnel - descontoMensal;

      if (valorDepoisDesconto < 0) {
        valorDepoisDesconto = 0;
      }

      let resultadoHTML = `
        <p class="text-center text-success fw-bold fs-5">
          FATURA ENEL/CE
        </p>

        <hr>

        <p>
          <strong>Consumo informado:</strong>
          ${formatarConsumo(consumo)} kWh
        </p>

        <p>
          <strong>Tipo de ligação:</strong>
          ${nomeTipoLigacao}
        </p>

        <p>
          <strong>Custo de disponibilidade:</strong>
          ${formatarConsumo(consumoMinimo)} kWh
        </p>

        <p>
          <strong>Consumo considerado para o desconto:</strong>
          ${formatarConsumo(consumoConsiderado)} kWh
        </p>

        <p>
          <strong>Tarifa TE:</strong>
          R$ ${formatarTarifa(tarifaTE)}/kWh
        </p>

        <p>
          <strong>Tarifa TUSD:</strong>
          R$ ${formatarTarifa(tarifaTUSD)}/kWh
        </p>

        <p>
          <strong>Adicional de bandeira:</strong>
          R$ ${formatarTarifa(adcBandeira)}/kWh
        </p>

        <p>
          <strong>Valor da fatura da Enel:</strong>
          ${formatarMoeda(valorFaturaEnel)}
        </p>

        <p class="text-center text-success fw-bold fs-5 mt-3 mb-0">
          FATURA SUNBOLT FLEX
        </p>
      `;

      if (desconto > 0 && consumoConsiderado > 0) {
        resultadoHTML += `
          <hr>

          <p>
            <strong>Desconto aplicado:</strong>
            ${formatarPercentual(desconto * 100)}%
          </p>

          <p>
            <strong>Desconto mensal previsto:</strong>
            ${formatarMoeda(descontoMensal)}
          </p>

          <p>
            <strong>Desconto anual previsto:</strong>
            ${formatarMoeda(descontoAnual)}
          </p>

          <p>
            <strong>Valor estimado após o desconto:</strong>
            ${formatarMoeda(valorDepoisDesconto)}
          </p>

          <div class="aviso-atencao">
            ⚠️ <strong>Atenção:</strong>
            Esta é uma simulação. Os valores podem variar conforme
            bandeiras tarifárias, consumo real e condições de contrato.
          </div>
        `;
      } else if (consumoConsiderado <= 0) {
        resultadoHTML += `
          <div class="aviso-atencao">
            ⚠️ O consumo informado é menor ou igual ao custo de
            disponibilidade da ligação. Não existe consumo disponível
            para aplicação do desconto.
          </div>
        `;
      } else {
        resultadoHTML += `
          <div class="aviso-atencao">
            ⚠️ Nenhum desconto foi aplicado.
          </div>
        `;
      }

      resultadoDiv.innerHTML = resultadoHTML;
      resultadoDiv.style.display = "block";

      if (
        valorFaturaEnel >= 300 &&
        consumoConsiderado > 0
      ) {
        btnWhatsApp.style.display = "block";
        avisoDiv.textContent = "";
      } else if (valorFaturaEnel < 300) {
        btnWhatsApp.style.display = "none";

        avisoDiv.textContent =
          "⚠️ Faturas abaixo de R$ 300,00 não podem aderir ao desconto.";
      } else {
        btnWhatsApp.style.display = "none";
        avisoDiv.textContent = "";
      }
    }

    function enviarWhatsApp() {
      if (valorFaturaEnelAtual < 300) {
        alert(
          "⚠️ O envio só é permitido para valores a partir de R$ 300,00."
        );

        return;
      }

      const resultadoTexto =
        document.getElementById("resultado").innerText;

      const telefone = "5585999416424";

      const mensagem = encodeURIComponent(
        "Resultado do simulador de desconto de energia:\n\n" +
        resultadoTexto
      );

      const url =
        `https://wa.me/${telefone}?text=${mensagem}`;

      window.open(url, "_blank");
    }

    document.addEventListener(
      "keydown",
      function(evento) {
        if (evento.key === "Enter") {
          evento.preventDefault();
          calcular();
        }
      }
    );
  </script>

</body>
</html>
