<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Simulador de Desconto de Energia</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background:
        url("https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?auto=format&fit=crop&w=1600&q=80")
        no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .card {
      border-radius: 1rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
    }

    .top-image {
      width: 180px;
      height: auto;
      margin: 20px auto;
      display: block;
    }

    #btnWhatsApp {
      background-color: #25D366;
      border: none;
    }

    #btnWhatsApp:hover {
      background-color: #1ebe5b;
    }

    .aviso-atencao {
      background-color: #fff3cd;
      border-left: 5px solid #ffa500;
      padding: 12px;
      margin-top: 15px;
      font-size: 0.95rem;
      color: #664d03;
      border-radius: 4px;
    }

    .bloco-tarifas {
      padding: 15px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

  <div class="container py-4">

    <img src="LOGO-03.png" alt="Logo Sunbolt" class="top-image">

    <div class="card p-4 mx-auto" style="max-width: 500px;">

      <h2 class="text-center mb-4">
        ⚡ Simule seu Desconto - Gerador de Energia
      </h2>

      <div class="mb-3">
        <label for="consumo" class="form-label fw-bold">
          Consumo Mensal (kWh):
        </label>

        <input
          type="text"
          id="consumo"
          inputmode="decimal"
          placeholder="Ex: 647"
          class="form-control"
          autofocus
        >
      </div>

      <div class="bloco-tarifas">

        <h5 class="text-center mb-3">
          Tarifas da distribuidora
        </h5>

        <div class="mb-3">
          <label for="tarifaTE" class="form-label fw-bold">
            Tarifa TE (R$/kWh):
          </label>

          <input
            type="text"
            id="tarifaTE"
            inputmode="decimal"
            placeholder="Ex: 0,3413"
            class="form-control"
          >
        </div>

        <div class="mb-3">
          <label for="tarifaTUSD" class="form-label fw-bold">
            Tarifa TUSD (R$/kWh):
          </label>

          <input
            type="text"
            id="tarifaTUSD"
            inputmode="decimal"
            placeholder="Ex: 0,63974"
            class="form-control"
          >
        </div>

        <div>
          <label for="adcBandeira" class="form-label fw-bold">
            Adicional de Bandeira (R$/kWh):
          </label>

          <input
            type="text"
            id="adcBandeira"
            inputmode="decimal"
            placeholder="Ex: 0,02465 ou 0"
            class="form-control"
          >

          <small class="text-muted">
            Digite 0 caso não haja adicional de bandeira.
          </small>
        </div>

      </div>

      <div class="mb-3">
        <label for="descontoManual" class="form-label fw-bold">
          Desconto Manual (%):
        </label>

        <input
          type="text"
          id="descontoManual"
          inputmode="decimal"
          placeholder="Ex: 20, 22 ou 25"
          class="form-control"
        >
      </div>

      <button
        type="button"
        class="btn btn-success w-100 mb-3"
        onclick="calcular()"
      >
        Calcular
      </button>

      <div
        id="resultado"
        class="alert alert-light border mt-3"
        style="display: none;"
      ></div>

      <div
        id="aviso"
        class="text-danger fw-bold text-center"
      ></div>

      <button
        type="button"
        id="btnWhatsApp"
        class="btn w-100 mt-3 text-white"
        onclick="enviarWhatsApp()"
        style="display: none;"
      >
        📲 Enviar resultado pelo WhatsApp
      </button>

      <div
        id="erro"
        class="text-danger fw-bold text-center mt-2"
      ></div>

    </div>
  </div>

  <script>
    let valorTotal = 0;

    function converterNumero(valor) {
      if (!valor) {
        return 0;
      }

      const valorLimpo = valor
        .toString()
        .trim()
        .replace(/\s/g, "")
        .replace(",", ".");

      return parseFloat(valorLimpo) || 0;
    }

    function formatarMoeda(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarTarifa(valor) {
      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 4,
        maximumFractionDigits: 5
      });
    }

    function ocultarResultado() {
      document.getElementById("resultado").style.display = "none";
      document.getElementById("btnWhatsApp").style.display = "none";
      document.getElementById("aviso").textContent = "";
    }

    function mostrarErro(mensagem) {
      document.getElementById("erro").textContent = mensagem;
      ocultarResultado();
    }

    function calcular() {
      const consumo = converterNumero(
        document.getElementById("consumo").value
      );

      const tarifaTE = converterNumero(
        document.getElementById("tarifaTE").value
      );

      const tarifaTUSD = converterNumero(
        document.getElementById("tarifaTUSD").value
      );

      const adcBandeira = converterNumero(
        document.getElementById("adcBandeira").value
      );

      const descontoManual = converterNumero(
        document.getElementById("descontoManual").value
      );

      const erroDiv = document.getElementById("erro");
      const resultadoDiv = document.getElementById("resultado");
      const btnWhatsApp = document.getElementById("btnWhatsApp");
      const avisoDiv = document.getElementById("aviso");

      if (consumo <= 0) {
        mostrarErro("⚠️ Informe um consumo mensal válido.");
        return;
      }

      if (tarifaTE <= 0) {
        mostrarErro("⚠️ Informe uma tarifa TE válida.");
        return;
      }

      if (tarifaTUSD <= 0) {
        mostrarErro("⚠️ Informe uma tarifa TUSD válida.");
        return;
      }

      if (adcBandeira < 0) {
        mostrarErro("⚠️ O adicional de bandeira não pode ser negativo.");
        return;
      }

      if (descontoManual < 0) {
        mostrarErro("⚠️ O desconto não pode ser negativo.");
        return;
      }

      if (descontoManual > 100) {
        mostrarErro("⚠️ O desconto manual não pode ser maior que 100%.");
        return;
      }

      erroDiv.textContent = "";

      /*
        As tarifas agora são informadas manualmente nos campos:

        const tarifaTE
        const tarifaTUSD
        const adcBandeira
      */

      const valorTE = consumo * tarifaTE;
      const valorTUSD = consumo * tarifaTUSD;
      const valorBandeira = consumo * adcBandeira;

      valorTotal = valorTE + valorTUSD + valorBandeira;

      let desconto = 0;

      if (descontoManual > 0) {
        desconto = descontoManual / 100;
      } else {
        if (valorTotal >= 300 && valorTotal < 1000) {
          desconto = 0.15;
        } else if (valorTotal >= 1000) {
          desconto = 0.20;
        }
      }

      const descontoMensal = valorTotal * desconto;
      const descontoAnual = descontoMensal * 12;

      let valorDescFatura = valorTotal - descontoMensal;

      if (valorDescFatura < 0) {
        valorDescFatura = 0;
      }

      let resultadoHTML = `
        <p class="text-center text-success fw-bold fs-5">
          FATURA SUNBOLT FLEX
        </p>

        <hr>

        <p>
          <strong>Consumo informado:</strong>
          ${consumo.toLocaleString("pt-BR")} kWh
        </p>

        <p>
          <strong>Tarifa TE:</strong>
          R$ ${formatarTarifa(tarifaTE)}/kWh
        </p>

        <p>
          <strong>Tarifa TUSD:</strong>
          R$ ${formatarTarifa(tarifaTUSD)}/kWh
        </p>

        <p>
          <strong>Adicional de bandeira:</strong>
          R$ ${formatarTarifa(adcBandeira)}/kWh
        </p>

        <p>
          <strong>Valor estimado da fatura:</strong>
          ${formatarMoeda(valorTotal)}
        </p>
      `;

      if (desconto > 0) {
        resultadoHTML += `
          <hr>

          <p>
            <strong>Desconto aplicado:</strong>
            ${(desconto * 100).toLocaleString("pt-BR", {
              maximumFractionDigits: 2
            })}%
          </p>

          <p>
            <strong>Desconto mensal previsto:</strong>
            ${formatarMoeda(descontoMensal)}
          </p>

          <p>
            <strong>Desconto anual previsto:</strong>
            ${formatarMoeda(descontoAnual)}
          </p>

          <p>
            <strong>Valor estimado após o desconto:</strong>
            ${formatarMoeda(valorDescFatura)}
          </p>

          <div class="aviso-atencao">
            ⚠️ <strong>Atenção:</strong>
            Esta é uma simulação. Os valores podem variar conforme
            bandeiras tarifárias, consumo real e condições de contrato.
          </div>
        `;
      } else {
        resultadoHTML += `
          <div class="aviso-atencao">
            ⚠️ Nenhum desconto foi aplicado.
          </div>
        `;
      }

      resultadoDiv.innerHTML = resultadoHTML;
      resultadoDiv.style.display = "block";

      if (valorTotal >= 300) {
        btnWhatsApp.style.display = "block";
        avisoDiv.textContent = "";
      } else {
        btnWhatsApp.style.display = "none";
        avisoDiv.textContent =
          "⚠️ Faturas abaixo de R$ 300,00 não podem aderir ao desconto.";
      }
    }

    function enviarWhatsApp() {
      if (valorTotal < 300) {
        alert(
          "⚠️ O envio só é permitido para valores a partir de R$ 300,00."
        );
        return;
      }

      const resultadoTexto =
        document.getElementById("resultado").innerText;

      const telefone = "5585999416424";

      const mensagem = encodeURIComponent(
        "Resultado do simulador de desconto de energia:\n\n" +
        resultadoTexto
      );

      const url =
        `https://wa.me/${telefone}?text=${mensagem}`;

      window.open(url, "_blank");
    }

    document.addEventListener("keydown", function(evento) {
      if (evento.key === "Enter") {
        evento.preventDefault();
        calcular();
      }
    });
  </script>

</body>
</html>
